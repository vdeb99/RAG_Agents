services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    healthcheck:
      # This check uses a raw TCP connection - it works in ANY image
      test: ["CMD-SHELL", "nc -z localhost 6333 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.12.0
    container_name: neo4j_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Agents@1234
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./neo4j_data:/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s # Give it extra time for plugin installation

  backend:
    build: ./backend
    container_name: backend_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=Agents@1234
    # CHANGED: We now wait for START, not HEALTHY, to bypass Docker Desktop health bugs
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - rag-network

  frontend:
    build: ./frontend
    container_name: frontend_ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge